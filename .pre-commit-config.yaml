repos:
- repo: local
  hooks:
    - id: ruff-check
      name: "Run ruff check"
      language: system
      entry: uv run ruff check . --fix --force-exclude
      types: [python]

    - id: ruff-format
      name: "Run ruff format"
      language: system
      entry: uv run ruff format --force-exclude
      types: [python]
